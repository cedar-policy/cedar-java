name: Build and Test CedarJava
on:
  workflow_call:
    inputs:
      cedar_policy_ref:
        required: false
        type: string
      cedar_java_ref:
        required: false
        default: "main"
        type: string

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    runs-on: ubuntu-latest
    name: Build & Deploy
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout Cedar Java
        uses: actions/checkout@v4
        with:
          repository: rebecca-odonoghue/cedar-java
          ref: ${{ inputs.cedar_java_ref }}
      - name: Checkout cedar-policy
        uses: actions/checkout@v4
        with:
          repository: cedar-policy/cedar
          ref: ${{ inputs.cedar_policy_ref }}
          path: ./cedar
      - name: Prepare Rust Build
        run: rustup install stable && rustup default stable && rustup component add rustfmt
      - name: Configure CedarJavaFFI for CI build
        run: bash configure_ci_build.sh
      - name: Check FFI Formatting
        working-directory: CedarJavaFFI
        run: cargo fmt --all --check
      - name: Run FFI tests
        working-directory: CedarJavaFFI
        run: cargo test --all-features
      - name: Install Zig
        run: wget https://ziglang.org/download/0.11.0/zig-linux-x86_64-0.11.0.tar.xz -O - | tar xJ && echo "$(pwd)/zig-linux-x86_64-0.11.0" >> $GITHUB_PATH
      - name: Setup Java JDK
        uses: actions/setup-java@v4
        with:
          java-version: "17"
          distribution: "corretto"
          cache: "gradle"
      - name: Build FFI and Java Libraries
        working-directory: CedarJava
        run: ./gradlew build
      - name: Generate Java Documentation
        working-directory: CedarJava
        run: ./gradlew javadoc
      - name: Deploy to GitHub Packages
        working-directory: CedarJava
        run: ./gradlew publish
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
